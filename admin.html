<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin - PresensiQR</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>
<nav>
  <div class="nav-brand"><div class="nav-logo">🎓</div><div><div class="nav-title">Presensi<span>QR</span></div><div class="nav-sub">Panel Admin</div></div></div>
  <div class="nav-r" id="nav-user"><span class="nav-name" id="nav-name"></span><span class="role-pill" id="nav-chip"></span><button class="btn-nav" onclick="logout()">Keluar</button></div>
</nav>

<div class="wrap"><div class="layout">
  <div class="sidebar" id="sidebar">
    <button class="sb-btn active" onclick="switchTab('dash', this)"><div class="sb-icon">🏠</div>Dashboard</button>
    <div class="sb-sep">Manajemen</div>
    <button class="sb-btn" onclick="switchTab('admin-users', this); loadUserList()"><div class="sb-icon">👤</div>Kelola User</button>
    <button class="sb-btn" onclick="switchTab('setup', this); loadSetup()"><div class="sb-icon">⚙️</div>Setup Kelas</button>
    <div class="sb-sep">Monitoring</div>
    <button class="sb-btn" onclick="switchTab('history-all', this); loadHaCourses()"><div class="sb-icon">📋</div>Rekap Presensi</button>
    <button class="sb-btn" onclick="switchTab('gps', this); initGpsPanel()"><div class="sb-icon">🗺️</div>GPS Tracking</button>
  </div>

  <div id="content">
    <div class="tab-panel active" id="panel-dash">
      <div class="card"><div class="card-hd"><h2><div class="hd-icon">🏠</div>Dashboard</h2></div><p class="mut">Selamat datang, Admin.</p></div>
    </div>
    
    <div class="tab-panel" id="panel-admin-users">
      <div class="card">
        <div class="card-hd"><h2><div class="hd-icon">👤</div>Kelola User</h2></div>
        <div class="row2">
          <div>
            <div class="fg"><label>Nama</label><input id="au-name" placeholder="Nama lengkap"></div>
            <div class="fg"><label>Email</label><input id="au-email" type="email"></div>
            <div class="fg"><label>Password</label><input id="au-pw" type="password"></div>
            <div class="fg"><label>Role</label><select id="au-role" onchange="document.getElementById('au-nim-wrap').style.display=this.value==='mahasiswa'?'block':'none'"><option value="">— Pilih —</option><option value="mahasiswa">Mahasiswa</option><option value="dosen">Dosen</option><option value="admin">Admin</option></select></div>
            <div id="au-nim-wrap" class="fg" style="display:none"><label>NIM</label><input id="au-nim"></div>
            <button class="btn btn-primary btn-full" onclick="doAddUser()"><span class="aus"></span>Tambah User</button>
            <div class="alert" id="au-alert"></div>
          </div>
          <div>
            <div class="fg"><label>Filter Role</label><select id="ul-filter" onchange="loadUserList()"><option value="">Semua Role</option><option value="admin">Admin</option><option value="dosen">Dosen</option><option value="mahasiswa">Mahasiswa</option></select></div>
            <button class="btn btn-outline btn-full" onclick="loadUserList()">⟳ Refresh Data</button>
          </div>
        </div>
        <hr class="divider">
        <div class="tbl-wrap"><table><thead><tr><th>#</th><th>Nama</th><th>Email</th><th>Role</th><th>NIM</th></tr></thead><tbody id="user-list-tbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody></table></div>
      </div>
    </div>

    </div>
</div></div>

<script src="api.js"></script>
<script>
const S = checkAuth("admin");
function switchTab(id, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".sb-btn").forEach(b => b.classList.remove("active"));
  $("panel-" + id).classList.add("active"); btn.classList.add("active");
  setTimeout(() => Object.values(MAPS).forEach(m => { try { m.invalidateSize(); } catch(e){} }), 120);
}

async function doAddUser() {
  const name=_v("au-name"),email=_v("au-email"),password=_v("au-pw"),role=$("au-role").value,nim=_v("au-nim");
  if(!name||!email||!password||!role)return showAlert("au-alert","Semua field wajib.");
  setSpin("aus",true); const r=await api("admin/add-user",{name,email,password,role,nim}); setSpin("aus",false);
  if(!r.ok)return showAlert("au-alert",r.error);
  showAlert("au-alert",`✅ ${r.data.name} ditambahkan.`,"ok");
  ["au-name","au-email","au-pw","au-nim"].forEach(id=>$(id)&&($(id).value="")); loadUserList();
}

async function loadUserList() {
  const role=$("ul-filter").value; const r=await api("admin/list-users",role?{role}:{}); if(!r.ok)return;
  $("user-list-tbody").innerHTML=(r.data.items||[]).length===0 ? '<tr><td colspan="5" class="empty">Tidak ada user</td></tr>'
    : (r.data.items||[]).map((u,i)=>`<tr><td>${i+1}</td><td><strong>${u.name}</strong></td><td>${u.email}</td><td><span class="badge b-adm">${u.role}</span></td><td><code>${u.nim||"-"}</code></td></tr>`).join("");
}
// Tambahkan loadSetup(), loadHaCourses(), loadHistoryAll() di sini (sama persis dengan kode SPA sebelumnya).
</script>
</body>
</html>
