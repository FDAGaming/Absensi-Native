<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dosen - PresensiQR</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>
<nav>
  <div class="nav-brand"><div class="nav-logo">🎓</div><div><div class="nav-title">Presensi<span>QR</span></div><div class="nav-sub">Panel Dosen</div></div></div>
  <div class="nav-r" id="nav-user"><span class="nav-name" id="nav-name"></span><span class="role-pill" id="nav-chip"></span><button class="btn-nav" onclick="logout()">Keluar</button></div>
</nav>

<div class="wrap"><div class="layout">
  <div class="sidebar" id="sidebar">
    <button class="sb-btn active" onclick="switchTab('dash', this)"><div class="sb-icon">🏠</div>Dashboard</button>
    <div class="sb-sep">Akademik</div>
    <button class="sb-btn" onclick="switchTab('setup', this); loadSetup()"><div class="sb-icon">⚙️</div>Setup Kelas</button>
    <button class="sb-btn" onclick="switchTab('qr', this); loadQrCourses()"><div class="sb-icon">🔲</div>Generate QR</button>
    <button class="sb-btn" onclick="switchTab('history-all', this); loadHaCourses()"><div class="sb-icon">📋</div>Rekap Absen</button>
  </div>
  <div id="content">
     </div>
</div></div>

<script src="api.js"></script>
<script>
const S = checkAuth("dosen");
function switchTab(id, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".sb-btn").forEach(b => b.classList.remove("active"));
  $("panel-" + id).classList.add("active"); btn.classList.add("active");
  setTimeout(() => Object.values(MAPS).forEach(m => { try { m.invalidateSize(); } catch(e){} }), 120);
}
// Tambahkan fungsi loadSetup, doGenQR, renderQRCanvas dll.
</script>
</body>
</html>
