<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PresensiQR — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap auth-wrap">
  <div class="auth-hero">
    <div class="auth-hero-logo">🎓</div>
    <h1>Selamat Datang di <span>PresensiQR</span></h1>
    <p>Sistem absensi cerdas berbasis QR Code dinamis</p>
  </div>
  <div class="card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="authTab('login')">Masuk</button>
      <button class="auth-tab" id="tab-reg" onclick="authTab('reg')">Daftar</button>
    </div>
    <div id="auth-login">
      <div class="fg"><label>Email</label><input id="l-email" type="email" placeholder="email@kampus.ac.id"></div>
      <div class="fg"><label>Password</label><input id="l-pw" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()"><span class="ls"></span>Masuk ke Sistem</button>
      <div class="alert" id="l-alert"></div>
    </div>
    <div id="auth-reg" style="display:none">
      <div class="fg"><label>Nama Lengkap</label><input id="r-name" placeholder="Nama sesuai KTP"></div>
      <div class="fg"><label>Email</label><input id="r-email" type="email" placeholder="email@kampus.ac.id"></div>
      <div class="fg"><label>Password</label><input id="r-pw" type="password" placeholder="Min. 6 karakter"></div>
      <div class="fg"><label>Role</label>
        <select id="r-role" onchange="document.getElementById('nim-wrap').style.display=this.value==='mahasiswa'?'block':'none'">
          <option value="">— Pilih Role —</option><option value="mahasiswa">Mahasiswa</option><option value="dosen">Dosen</option>
        </select>
      </div>
      <div id="nim-wrap" class="fg" style="display:none"><label>NIM</label><input id="r-nim" placeholder="Nomor Induk Mahasiswa"></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()"><span class="rs"></span>Buat Akun</button>
      <div class="alert" id="r-alert"></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
window.onload = () => {
  const S = getSession();
  if (S.token && S.role) window.location.href = S.role + ".html"; 
};

function authTab(t) {
  $("auth-login").style.display = t === "login" ? "block" : "none";
  $("auth-reg").style.display   = t === "reg"   ? "block" : "none";
  $("tab-login").className = "auth-tab" + (t === "login" ? " active" : "");
  $("tab-reg").className   = "auth-tab" + (t === "reg"   ? " active" : "");
}

async function doLogin() {
  const email = _v("l-email"), password = _v("l-pw");
  if (!email || !password) return showAlert("l-alert", "Isi email dan password.");
  setSpin("ls", true);
  const r = await api("auth/login", { email, password });
  setSpin("ls", false);
  if (!r.ok) return showAlert("l-alert", r.error);
  
  // INI ADALAH BAGIAN KRUSIAL YANG MEMPERBAIKI MASALAH ANDA
  sessionStorage.setItem("ps", JSON.stringify(r.data));
  window.location.href = r.data.role + ".html";
}

async function doRegister() {
  const name=_v("r-name"), email=_v("r-email"), password=_v("r-pw"), role=$("r-role").value, nim=_v("r-nim");
  if (!name||!email||!password||!role) return showAlert("r-alert", "Semua field wajib diisi.");
  setSpin("rs", true);
  const r = await api("auth/register", { name, email, password, role, nim });
  setSpin("rs", false);
  if (!r.ok) return showAlert("r-alert", r.error);
  showAlert("r-alert", "✅ Registrasi berhasil! Silakan login.", "ok");
}
</script>
</body>
</html>
