<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Presensi Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --border: #e2e8f0;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container & Card */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid var(--border);
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .login-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #334155;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        /* Button */
        .btn-submit {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Error Alert */
        .alert {
            display: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 20px;
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

          /* --- RESPONSIVE MOBILE --- */
    .mobile-header { display: none; background: var(--bg-sidebar); color: white; padding: 15px 20px; align-items: center; justify-content: space-between; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .mobile-toggle { background: transparent; color: white; border: none; font-size: 1.5rem; cursor: pointer; }
    .table-wrap { overflow-x: auto; width: 100%; border-radius: 8px; }

    @media (max-width: 768px) {
        body { flex-direction: column; }
        .mobile-header { display: flex; }
        .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; z-index: 50; transition: 0.3s ease-in-out; box-shadow: 4px 0 10px rgba(0,0,0,0.2); }
        .sidebar.show { left: 0; }
        .content { padding: 15px; width: 100%; }
        .panel { padding: 15px; }
        .form-grid { grid-template-columns: 1fr; } /* Memaksa input form menumpuk ke bawah di HP */
        .qr-display-area img { max-width: 100%; height: auto; }
    }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Presensi Cloud</h1>
                <p>Silakan masuk ke akun Anda</p>
            </div>

            <div id="error-alert" class="alert">
                Email atau password salah.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" class="form-control" placeholder="contoh@kampus.ac.id" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="btnSubmit" class="btn-submit">
                    Masuk
                </button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 Sistem Presensi Akademik Terpadu
        </div>
    </div>

    <script src="api.js"></script>
    
    <script>
        // Cek jika user sudah login (punya token), lempar ke dashboard
        window.onload = () => {
            const token = localStorage.getItem("auth_token");
            const role = localStorage.getItem("user_role");
            if (token && role) {
                redirectBasedOnRole(role);
            }
        };

        function redirectBasedOnRole(role) {
            if (role === "admin") {
                window.location.href = "admin.html";
            } else if (role === "dosen") {
                window.location.href = "dashboard-dosen.html";
            } else if (role === "mahasiswa") {
                window.location.href = "dashboard-mahasiswa.html";
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btnSubmit');
            const errorAlert = document.getElementById('error-alert');
            
            // State: Loading
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Memproses...';
            errorAlert.style.display = "none";

            // Panggil API (auth_token tidak diperlukan untuk endpoint ini)
            const result = await apiCall("auth/login", {
                email: emailInput,
                password: passwordInput
            });

            if (result.ok) {
                // Sukses: Simpan data kredensial
                localStorage.setItem("auth_token", result.data.token);
                localStorage.setItem("user_role", result.data.role);
                localStorage.setItem("user_name", result.data.name);
                
                // Redirect otomatis
                redirectBasedOnRole(result.data.role);
            } else {
                // Gagal: Tampilkan alert merah
                errorAlert.innerText = result.error || "Gagal terhubung ke server.";
                errorAlert.style.display = "block";
                
                // Kembalikan tombol
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Masuk';
            }
        });
    </script>
</body>
</html>
